<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Chi Tiêu - Đăng Ký</title>
    <style>
        :root {
            --primary: #5c8d89;
            --primary-dark: #4a716e;
            --bg: #f0f7f4;
            --text: #333;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #d1e7dd 0%, #ffffff 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%;
            max-width: 380px; 
            text-align: center;
            transition: transform 0.3s ease;
        }

        .container:hover { transform: translateY(-5px); }

        .logo { font-size: 60px; margin-bottom: 10px; display: block; }
        
        h2 { color: var(--text); margin-bottom: 1.5rem; font-weight: 700; }

        .input-group { margin-bottom: 15px; text-align: left; }

        input { 
            width: 100%; 
            padding: 14px; 
            border: 1.5px solid #eee; 
            border-radius: 12px; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(92, 141, 137, 0.1); }

        .btn { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover { background-color: var(--primary-dark); transform: scale(1.02); }
        .btn:active { transform: scale(0.98); }

        .footer-text { margin-top: 20px; font-size: 14px; color: #777; }
        a { color: var(--primary); text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }

        /* Thông báo lỗi nhỏ dưới input */
        .error-msg { color: #dc3545; font-size: 12px; margin-top: 4px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">💰</span>
        <h2>Tạo tài khoản</h2>
        <form id="regForm">
            <div class="input-group">
                <input type="text" id="regName" placeholder="Họ và tên" required>
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="Email của bạn" required>
            </div>
            <div class="input-group">
                <input type="password" id="regPass" placeholder="Mật khẩu (ít nhất 6 ký tự)" minlength="6" required>
            </div>
            <div class="input-group">
                <input type="password" id="confirmPass" placeholder="Xác nhận mật khẩu" required>
                <div id="passError" class="error-msg">Mật khẩu không trùng khớp!</div>
            </div>
            <button type="submit" class="btn">BẮT ĐẦU NGAY</button>
        </form>
        <p class="footer-text">Đã có tài khoản? <a href="index.html">Đăng nhập</a></p>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const confirm = document.getElementById('confirmPass').value;
            const passError = document.getElementById('passError');

            // 1. Kiểm tra khớp mật khẩu
            if (pass !== confirm) {
                passError.style.display = 'block';
                return;
            } else {
                passError.style.display = 'none';
            }

            // 2. Lấy danh sách user cũ hoặc tạo mảng mới nếu chưa có
            let users = JSON.parse(localStorage.getItem('users')) || [];

            // 3. Kiểm tra xem email đã tồn tại chưa
            const userExists = users.find(u => u.email === email);
            if (userExists) {
                alert("Email này đã được đăng ký!");
                return;
            }

            // 4. Thêm user mới vào mảng
            users.push({ name, email, password: pass });

            // 5. Lưu lại vào LocalStorage
            localStorage.setItem('users', JSON.stringify(users));

            alert("Chúc mừng! Đăng ký thành công.");
            window.location.href = "index.html"; 
        });
    </script>
</body>
</html>
